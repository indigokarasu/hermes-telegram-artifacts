<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root {
  --bg: var(--tg-theme-bg-color, #f5f5f5);
  --card: var(--tg-theme-section-bg-color, #ffffff);
  --fg: var(--tg-theme-text-color, #1a1a1a);
  --muted: var(--tg-theme-hint-color, #666);
  --accent: var(--tg-theme-accent-text-color, #0ea5e9);
  --border: var(--tg-theme-section-separator-color, #e0e0e0);
  --green: #16a34a;
  --red: #dc2626;
}
* { box-sizing: border-box; margin: 0; padding: 0 }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); padding: 12px; font-size: 14px }

.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 8px; flex-wrap: wrap }
.title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px }
.meta { font-size: 12px; color: var(--muted) }

.search-box {
  width: 100%;
  padding: 10px 12px;
  border: 0.5px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  color: var(--fg);
  font-size: 14px;
  outline: none;
  margin-bottom: 10px;
}
.search-box:focus { border-color: var(--accent) }
.search-box::placeholder { color: var(--muted) }

.table-wrap {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 10px;
}

.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch }

table { width: 100%; border-collapse: collapse; white-space: nowrap }
th {
  text-align: left;
  padding: 10px 12px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  user-select: none;
  position: relative;
}
th:hover { color: var(--accent) }
th .arrow { margin-left: 4px; font-size: 10px; opacity: 0.4 }
th.sorted .arrow { opacity: 1; color: var(--accent) }

td {
  padding: 10px 12px;
  font-size: 13px;
  border-bottom: 0.5px solid var(--border);
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
}
tr:last-child td { border-bottom: none }
tr:hover td { background: color-mix(in srgb, var(--accent) 4%, transparent) }

.highlight { background: color-mix(in srgb, var(--accent) 15%, transparent); border-radius: 2px; padding: 0 1px }

.stats-bar {
  display: flex;
  gap: 16px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--muted);
  border-top: 0.5px solid var(--border);
}
.stats-bar span { display: flex; align-items: center; gap: 4px }
.stat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green) }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 14px;
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="title">{{TITLE}}</div>
    <div class="meta" id="meta"></div>
  </div>
</div>

<input class="search-box" id="search" type="text" placeholder="Search rows...">

<div class="table-wrap">
  <div class="table-scroll">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="stats-bar" id="stats"></div>
</div>

<script>
const CSV = `{{CSV_DATA}}`;

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = parseCSVRow(lines[0]);
  const rows = lines.slice(1).map(line => {
    const vals = parseCSVRow(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').trim());
    return obj;
  });
  return { headers: headers.map(h => h.trim()), rows };
}

function parseCSVRow(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"' && line[i + 1] === '"') {
        current += '"';
        i++;
      } else if (ch === '"') {
        inQuotes = false;
      } else {
        current += ch;
      }
    } else {
      if (ch === '"') {
        inQuotes = true;
      } else if (ch === ',') {
        result.push(current);
        current = '';
      } else {
        current += ch;
      }
    }
  }
  result.push(current);
  return result;
}

function detectNumeric(rows, headers) {
  const numeric = new Set();
  headers.forEach(h => {
    const allNum = rows.every(r => r[h] && !isNaN(Number(r[h].replace(/,/g, ''))));
    if (allNum && rows.length > 0 && rows[0][h] !== '') numeric.add(h);
  });
  return numeric;
}

function fmtNum(v) {
  if (v === undefined || v === '') return '';
  const n = Number(v.replace(/,/g, ''));
  if (isNaN(n)) return v;
  return n.toLocaleString();
}

const { headers, rows } = parseCSV(CSV);
const numericCols = detectNumeric(rows, headers);
let sortCol = -1, sortAsc = true, filterText = '';

function getFiltered() {
  if (!filterText) return rows;
  const q = filterText.toLowerCase();
  return rows.filter(r => headers.some(h => (r[h] || '').toLowerCase().includes(q)));
}

function highlightMatch(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<span class="highlight">' + text.slice(idx, idx + query.length) + '</span>' + text.slice(idx + query.length);
}

function sortValue(v) {
  if (numericCols.has(headers[sortCol])) return Number((v || '').replace(/,/g, '')) || 0;
  return (v || '').toLowerCase();
}

function render() {
  let data = getFiltered();
  if (sortCol >= 0) {
    const h = headers[sortCol];
    data = [...data].sort((a, b) => {
      const va = sortValue(a[h]), vb = sortValue(b[h]);
      if (va < vb) return sortAsc ? -1 : 1;
      if (va > vb) return sortAsc ? 1 : -1;
      return 0;
    });
  }

  document.getElementById('thead').innerHTML = '<tr>' + headers.map((h, i) => {
    const cls = i === sortCol ? ' class="sorted"' : '';
    const arrow = i === sortCol ? (sortAsc ? '▲' : '▼') : '▲';
    return '<th' + cls + ' data-col="' + i + '">' + h + '<span class="arrow">' + arrow + '</span></th>';
  }).join('') + '</tr>';

  const tbody = document.getElementById('tbody');
  if (data.length === 0) {
    tbody.innerHTML = '<tr><td colspan="' + headers.length + '" class="empty-state">No matching rows</td></tr>';
  } else {
    tbody.innerHTML = data.map(r => '<tr>' + headers.map(h => {
      const raw = r[h] || '';
      const display = numericCols.has(h) ? fmtNum(raw) : highlightMatch(raw, filterText);
      const style = numericCols.has(h) ? ' style="text-align:right;font-variant-numeric:tabular-nums"' : '';
      return '<td' + style + '>' + display + '</td>';
    }).join('') + '</tr>').join('');
  }

  const total = rows.length, shown = data.length;
  document.getElementById('stats').innerHTML =
    '<span><span class="stat-dot"></span> ' + shown + ' of ' + total + ' rows</span>' +
    '<span>' + headers.length + ' columns</span>' +
    (numericCols.size > 0 ? '<span>' + numericCols.size + ' numeric</span>' : '');
  document.getElementById('meta').textContent = total + ' rows × ' + headers.length + ' columns';
}

document.getElementById('thead').addEventListener('click', function(e) {
  const th = e.target.closest('th');
  if (!th) return;
  const col = Number(th.dataset.col);
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  render();
});

document.getElementById('search').addEventListener('input', function(e) {
  filterText = e.target.value;
  render();
});

render();

const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
if (tg) {
  try {
    tg.ready();
    tg.setHeaderColor(tg.themeParams?.bg_color || '#f5f5f5');
    tg.setBackgroundColor(tg.themeParams?.bg_color || '#f5f5f5');
    tg.onEvent('themeChanged', function() {
      var p = tg.themeParams;
      if (p) { tg.setHeaderColor(p.bg_color); tg.setBackgroundColor(p.bg_color); }
    });
  } catch(e) { console.error('[TG]', e); }
}
</script>
</body>
</html>
